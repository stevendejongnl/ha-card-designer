name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            custom_components/ha_card_designer/assets/ha-card-designer-panel.js
